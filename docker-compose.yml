services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: shiyige-postgres
    environment:
      POSTGRES_DB: shiyige
      POSTGRES_USER: shiyige
      POSTGRES_PASSWORD: shiyige
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shiyige -d shiyige"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: shiyige-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: shiyige-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: shiyige-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shiyige-api
    environment:
      DATABASE_URL: postgresql+psycopg://shiyige:shiyige@postgres:5432/shiyige
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
      SECRET_KEY: shiyige-compose-secret
      ENABLE_STARTUP_CHECKS: "false"
      EMBEDDING_PROVIDER: fastembed_dense
      EMBEDDING_MODEL_NAME: BAAI/bge-small-zh-v1.5
      EMBEDDING_DIMENSION: "512"
      EMBEDDING_MODEL_SOURCE: FastEmbed ONNX runtime for Chinese semantic retrieval
      EMBEDDING_MODEL_REVISION: qdrant-fastembed
      EMBEDDING_DEVICE: cpu
      EMBEDDING_NORMALIZE: "true"
      EMBEDDING_CACHE_DIR: /app/backend/.cache/fastembed
      SPARSE_EMBEDDING_PROVIDER: fastembed_sparse
      SPARSE_EMBEDDING_MODEL_NAME: Qdrant/bm25
      SPARSE_EMBEDDING_DIMENSION: "0"
      SPARSE_EMBEDDING_MODEL_SOURCE: FastEmbed sparse BM25 for keyword retrieval
      SPARSE_EMBEDDING_MODEL_REVISION: qdrant-bm25
      SPARSE_EMBEDDING_DEVICE: cpu
      SPARSE_EMBEDDING_NORMALIZE: "false"
      COLBERT_EMBEDDING_PROVIDER: fastembed_colbert
      COLBERT_EMBEDDING_MODEL_NAME: answerdotai/answerai-colbert-small-v1
      COLBERT_EMBEDDING_DIMENSION: "96"
      COLBERT_EMBEDDING_MODEL_SOURCE: FastEmbed late interaction reranker
      COLBERT_EMBEDDING_MODEL_REVISION: answerai-colbert-small-v1
      COLBERT_EMBEDDING_DEVICE: cpu
      COLBERT_EMBEDDING_NORMALIZE: "true"
      VECTOR_DB_PROVIDER: qdrant
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ""
      QDRANT_COLLECTION_PRODUCTS: shiyige_products_v1
      QDRANT_COLLECTION_USERS: shiyige_users_v1
      QDRANT_COLLECTION_CF: shiyige_collaborative_v1
      RECOMMENDATION_PIPELINE_VERSION: v1
    volumes:
      - api-model-cache:/app/backend/.cache/fastembed
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      qdrant:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    container_name: shiyige-nginx
    depends_on:
      api:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./front:/usr/share/nginx/html/front:ro
      - ./admin:/usr/share/nginx/html/admin:ro

volumes:
  postgres-data:
  redis-data:
  minio-data:
  qdrant-data:
  api-model-cache:
