<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>拾遗阁后台 - 仪表盘</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/admin.css" />
  </head>
  <body data-page="dashboard">
    <div class="admin-shell">
      <aside class="admin-sidebar">
        <a class="admin-brand" href="index.html">拾遗阁后台</a>
        <p class="admin-subtitle">可演示后台，聚焦商品、订单与推荐索引。</p>
        <nav id="admin-nav" class="admin-nav"></nav>
        <section class="admin-user-panel">
          <p class="admin-eyebrow">当前管理员</p>
          <strong id="admin-email-display" class="admin-identity">加载中...</strong>
          <span id="admin-role-display" class="admin-role">-</span>
          <button id="logout-button" class="admin-button secondary mt-3" type="button">
            退出登录
          </button>
        </section>
      </aside>
      <main class="admin-main">
        <header class="admin-page-header">
          <p class="page-kicker">Overview</p>
          <h1>后台仪表盘</h1>
          <p class="page-copy">
            快速查看前台用户、商品总量、订单状态和支付情况，为后续后台页面操作提供第一入口。
          </p>
        </header>
        <div id="admin-flash"></div>
        <section class="metric-grid">
          <article class="metric-card">
            <span class="metric-label">前台用户数</span>
            <strong id="summary-users" class="metric-value">-</strong>
          </article>
          <article class="metric-card">
            <span class="metric-label">商品总数</span>
            <strong id="summary-products" class="metric-value">-</strong>
          </article>
          <article class="metric-card">
            <span class="metric-label">订单总数</span>
            <strong id="summary-orders" class="metric-value">-</strong>
          </article>
          <article class="metric-card">
            <span class="metric-label">已支付订单</span>
            <strong id="summary-paid-orders" class="metric-value">-</strong>
          </article>
          <article class="metric-card">
            <span class="metric-label">待支付订单</span>
            <strong id="summary-pending-orders" class="metric-value">-</strong>
          </article>
        </section>

        <section class="admin-panel">
          <h2>推荐效果看板</h2>
          <p class="page-copy">
            聚合曝光、点击、加购、支付与覆盖率指标，用于直接说明推荐系统具备可观测效果。
          </p>
          <div id="recommendation-kpis" class="metric-grid"></div>
        </section>

        <section class="admin-panel">
          <h2>搜索与向量索引状态</h2>
          <p class="page-copy">
            同时展示搜索请求延迟、Qdrant 运行状态、collection 状态和已索引商品量。
          </p>
          <div id="search-kpis" class="metric-grid"></div>
          <div id="dashboard-vector-status" class="admin-metadata-grid mt-4"></div>
        </section>

        <section class="admin-panel">
          <h2>实验方案概览</h2>
          <p id="dashboard-active-experiment" class="page-copy">
            当前实验配置加载中...
          </p>
          <div id="dashboard-experiment-list" class="debug-card-grid"></div>
        </section>
      </main>
    </div>
    <script src="js/app.js"></script>
  </body>
</html>
