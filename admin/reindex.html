<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>拾遗阁后台 - 推荐重建</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/admin.css" />
  </head>
  <body data-page="reindex">
    <div class="admin-shell">
      <aside class="admin-sidebar">
        <a class="admin-brand" href="index.html">拾遗阁后台</a>
        <p class="admin-subtitle">最小可演示后台，聚焦商品、订单与推荐索引。</p>
        <nav id="admin-nav" class="admin-nav"></nav>
        <section class="admin-user-panel">
          <p class="admin-eyebrow">当前管理员</p>
          <strong id="admin-email-display" class="admin-identity">加载中...</strong>
          <span id="admin-role-display" class="admin-role">-</span>
          <button id="logout-button" class="admin-button secondary mt-3" type="button">
            退出登录
          </button>
        </section>
      </aside>
      <main class="admin-main">
        <header class="admin-page-header">
          <p class="page-kicker">Reindex</p>
          <h1>推荐重建</h1>
          <p class="page-copy">
            当前页面用于手动触发商品向量索引全量重建。
          </p>
        </header>
        <div id="admin-flash"></div>
        <section class="admin-panel">
          <h2>商品向量索引状态</h2>
          <p class="page-copy">
            先查看 Qdrant 连接、collection 状态、索引总量和失败数量，再决定是否执行全量或失败重试。
          </p>
          <div id="vector-status-metrics" class="metric-grid"></div>
          <div id="vector-runtime-grid" class="admin-metadata-grid mt-4"></div>
        </section>

        <section class="admin-panel">
          <h2>商品向量重建</h2>
          <p class="page-copy">
            点击后会调用真实后台向量索引接口，并同步返回本次重建的数量统计与模型名称。
          </p>
          <div class="admin-toolbar">
            <button id="reindex-products-btn" class="admin-button" type="button">
              全量重建商品向量
            </button>
            <button id="retry-failed-btn" class="admin-button secondary" type="button">
              仅重试失败商品
            </button>
          </div>
          <div id="reindex-result"></div>
        </section>

        <section class="admin-table-panel">
          <div class="admin-table-panel-header">
            <h2>索引失败商品</h2>
            <p>如果某些商品未成功进入 Qdrant，这里会直接展示失败原因和最近索引时间。</p>
          </div>
          <table class="admin-table">
            <thead>
              <tr>
                <th>商品 ID</th>
                <th>错误信息</th>
                <th>最近索引时间</th>
              </tr>
            </thead>
            <tbody id="vector-failed-body">
              <tr>
                <td colspan="3" class="empty-state">正在加载索引失败商品...</td>
              </tr>
            </tbody>
          </table>
        </section>
      </main>
    </div>
    <script src="js/app.js"></script>
  </body>
</html>
