<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>拾遗阁后台 - 订单管理</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/admin.css" />
  </head>
  <body data-page="orders">
    <div class="admin-shell">
      <aside class="admin-sidebar">
        <a class="admin-brand" href="index.html">拾遗阁后台</a>
        <p class="admin-subtitle">最小可演示后台，聚焦商品、订单与推荐索引。</p>
        <nav id="admin-nav" class="admin-nav"></nav>
        <section class="admin-user-panel">
          <p class="admin-eyebrow">当前管理员</p>
          <strong id="admin-email-display" class="admin-identity">加载中...</strong>
          <span id="admin-role-display" class="admin-role">-</span>
          <button id="logout-button" class="admin-button secondary mt-3" type="button">
            退出登录
          </button>
        </section>
      </aside>
      <main class="admin-main">
        <header class="admin-page-header">
          <p class="page-kicker">Orders</p>
          <h1>订单管理</h1>
          <p class="page-copy">
            这里展示后台订单列表，包含下单用户、订单状态、支付金额和创建时间，来自真实后台订单接口。
          </p>
        </header>
        <div id="admin-flash"></div>
        <section class="admin-table-panel">
          <div class="admin-table-panel-header">
            <h2>订单列表</h2>
            <p>用于演示后台订单读链路、用户信息聚合和支付状态查看。</p>
          </div>
          <table class="admin-table">
            <thead>
              <tr>
                <th>订单号</th>
                <th>下单用户</th>
                <th>状态</th>
                <th>支付金额</th>
                <th>商品数</th>
                <th>创建时间</th>
              </tr>
            </thead>
            <tbody id="orders-table-body">
              <tr>
                <td colspan="6" class="empty-state">订单加载中...</td>
              </tr>
            </tbody>
          </table>
        </section>
      </main>
    </div>
    <script src="js/app.js"></script>
  </body>
</html>
