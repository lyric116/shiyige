<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>拾遗阁后台 - 登录</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/admin.css" />
  </head>
  <body data-page="login">
    <main class="login-shell">
      <section class="login-card">
        <div class="login-copy">
          <p class="page-kicker">Shiyige Admin</p>
          <h1>拾遗阁后台管理台</h1>
          <p>
            演示环境中的商品、订单与推荐索引管理。当前登录入口接入真实后台鉴权接口，不再依赖本地假状态。
          </p>
        </div>
        <div class="login-form-panel">
          <h2>后台登录</h2>
          <div id="admin-flash"></div>
          <form id="admin-login-form" class="admin-form">
            <label for="admin-email">
              后台邮箱
              <input
                id="admin-email"
                name="email"
                type="email"
                placeholder="admin@shiyige-demo.com"
                autocomplete="username"
              />
            </label>
            <label for="admin-password">
              后台密码
              <input
                id="admin-password"
                name="password"
                type="password"
                placeholder="请输入后台密码"
                autocomplete="current-password"
              />
            </label>
            <button class="admin-button" type="submit">进入后台</button>
          </form>
          <p class="form-note">
            默认演示账号由基础数据种子自动创建，便于后续端到端联调。
          </p>
        </div>
      </section>
    </main>
    <script src="js/app.js"></script>
  </body>
</html>
