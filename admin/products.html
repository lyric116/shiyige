<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>拾遗阁后台 - 商品管理</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/admin.css" />
  </head>
  <body data-page="products">
    <div class="admin-shell">
      <aside class="admin-sidebar">
        <a class="admin-brand" href="index.html">拾遗阁后台</a>
        <p class="admin-subtitle">最小可演示后台，聚焦商品、订单与推荐索引。</p>
        <nav id="admin-nav" class="admin-nav"></nav>
        <section class="admin-user-panel">
          <p class="admin-eyebrow">当前管理员</p>
          <strong id="admin-email-display" class="admin-identity">加载中...</strong>
          <span id="admin-role-display" class="admin-role">-</span>
          <button id="logout-button" class="admin-button secondary mt-3" type="button">
            退出登录
          </button>
        </section>
      </aside>
      <main class="admin-main">
        <header class="admin-page-header">
          <p class="page-kicker">Catalog</p>
          <h1>商品管理</h1>
          <p class="page-copy">
            当前页面直接读取真实后台商品接口，展示单默认 SKU 模型下的价格、库存、类目和标签信息。
          </p>
        </header>
        <div id="admin-flash"></div>
        <section class="admin-table-panel">
          <div class="admin-table-panel-header">
            <h2>商品列表</h2>
            <p>用于演示后台商品管理读链路已接通真实接口。</p>
          </div>
          <table class="admin-table">
            <thead>
              <tr>
                <th>商品</th>
                <th>类目</th>
                <th>售价</th>
                <th>库存</th>
                <th>状态</th>
                <th>标签</th>
              </tr>
            </thead>
            <tbody id="products-table-body">
              <tr>
                <td colspan="6" class="empty-state">商品加载中...</td>
              </tr>
            </tbody>
          </table>
        </section>
      </main>
    </div>
    <script src="js/app.js"></script>
  </body>
</html>
