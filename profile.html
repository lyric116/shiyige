                <p class="text-muted" id="sidebar-email">邮箱地址</p>
              </div>
              <div class="profile-sidebar-menu">
                <ul class="list-group">

                    </a>

                    >

          </div>

          <!-- 主内容 -->
          <div class="col-md-9">
            <div class="profile-content">
              <h2 class="mb-4">个人信息</h2>

              <div class="card mb-4">
                <div class="card-body">
                  <form id="profile-form" class="row g-3">
                    <div class="col-md-6">
                      <label for="username" class="form-label">用户名</label>
                      <input
                        type="text"
                        class="form-control"
                        id="username"
                        name="username"
                        required
                      />
                    </div>

                    <div class="col-md-6">
                      <label for="email" class="form-label">电子邮箱</label>
                      <input
                        type="email"
                        class="form-control"
                        id="email"
                        name="email"
                        required
                      />
                    </div>

                    <div class="col-md-6">
                      <label for="phone" class="form-label">手机号码</label>
                      <input
                        type="tel"
                        class="form-control"
                        id="phone"
                        name="phone"
                        placeholder="选填"
                      />
                    </div>

                    <div class="col-md-6">
                      <label for="birthday" class="form-label">出生日期</label>
                      <input
                        type="date"
                        class="form-control"
                        id="birthday"
                        name="birthday"
                        placeholder="选填"
                      />
                    </div>

                    <div class="col-12">
                      <label for="address" class="form-label">收货地址</label>
                      <input
                        type="text"
                        class="form-control"
                        id="address"
                        name="address"
                        placeholder="选填"
                      />
                    </div>

                    <div class="col-12 mt-4">
                      <button type="submit" class="btn btn-primary">
                        保存修改
                      </button>
                    </div>
                  </form>
                </div>
              </div>

              <div class="card">
                <div class="card-header">修改密码</div>
                <div class="card-body">
                  <form id="password-form" class="row g-3">
                    <div class="col-md-6">
                      <label for="current-password" class="form-label"
                        >当前密码</label
                      >
                      <input
                        type="password"
                        class="form-control"
                        id="current-password"
                        name="current-password"
                        required
                      />
                    </div>

                    <div class="col-md-6"></div>

                    <div class="col-md-6">
                      <label for="new-password" class="form-label"
                        >新密码</label
                      >
                      <input
                        type="password"
                        class="form-control"
                        id="new-password"
                        name="new-password"
                        required
                      />
                    </div>

                    <div class="col-md-6">
                      <label for="confirm-password" class="form-label"
                        >确认新密码</label
                      >
                      <input
                        type="password"
                        class="form-control"
                        id="confirm-password"
                        name="confirm-password"
                        required
                      />
                    </div>

                    <div class="col-12 mt-4">
                      <button type="submit" class="btn btn-primary">
                        修改密码
                      </button>
                    </div>
                  </form>
                </div>
              </div>
            </div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        // 检查是否已登录，未登录则重定向到登录页
        if (!isLoggedIn()) {
          window.location.href = "login.html";
          return;
        }

        // 获取用户信息
        const user = getCurrentUser();

        // 更新页面用户信息
        document.getElementById("sidebar-username").textContent = user.username;
        document.getElementById("sidebar-email").textContent = user.email;

        // 表单填入用户信息
        document.getElementById("username").value = user.username;
        document.getElementById("email").value = user.email;

        // 绑定退出登录事件
        document
          .getElementById("logout-sidebar-btn")
          .addEventListener("click", function (e) {
            e.preventDefault();
            logout();
          });

        // 绑定表单提交事件
        document
          .getElementById("profile-form")
          .addEventListener("submit", function (e) {
            e.preventDefault();

            // 获取表单数据
            const username = document.getElementById("username").value;
            const email = document.getElementById("email").value;
            const phone = document.getElementById("phone").value;
            const birthday = document.getElementById("birthday").value;
            const address = document.getElementById("address").value;

            // 更新用户信息
            user.username = username;
            user.email = email;
            user.phone = phone;
            user.birthday = birthday;
            user.address = address;

            // 保存到localStorage
            localStorage.setItem("shiyige_user", JSON.stringify(user));

            // 更新侧边栏信息
            document.getElementById("sidebar-username").textContent = username;
            document.getElementById("sidebar-email").textContent = email;

            // 更新导航栏
            updateNavigation();

            // 显示成功消息
            showNotification("个人信息已更新", "success");
          });

        // 绑定密码修改表单提交事件
        document
          .getElementById("password-form")
          .addEventListener("submit", function (e) {
            e.preventDefault();

            const currentPassword =
              document.getElementById("current-password").value;
            const newPassword = document.getElementById("new-password").value;
            const confirmPassword =
              document.getElementById("confirm-password").value;

            // 简单验证
            if (!currentPassword) {
              showNotification("请输入当前密码", "error");
              return;
            }

            if (!newPassword) {
              showNotification("请输入新密码", "error");
              return;
            }

            if (newPassword !== confirmPassword) {
              showNotification("两次输入的密码不一致", "error");
              return;
            }

            // 假设验证成功（实际应用中需要发送请求到服务器验证）
            showNotification("密码修改成功", "success");

            // 清空表单
            document.getElementById("current-password").value = "";
            document.getElementById("new-password").value = "";
            document.getElementById("confirm-password").value = "";
          });
      });
    </script>
