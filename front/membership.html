<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>拾遗阁 - 会员中心</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <!-- 自定义样式 -->
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- 渐变背景斑点 -->
    <div class="gradient-spot"></div>
    <div class="gradient-spot"></div>
    <div class="gradient-spot"></div>
    <div class="gradient-spot"></div>
    <div class="gradient-spot"></div>
    <div class="gradient-spot"></div>

    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
      <!-- ...existing navbar code... -->
    </nav>

    <!-- 闪现消息 -->
    <div id="flash-messages" class="container mt-3"></div>

    <!-- 主内容区域 -->
    <main class="py-4">
      <div class="container my-4">
        <!-- 返回首页按钮 -->
        <div class="mb-4">
          <a href="index.html" class="btn btn-outline-primary">
            <i class="fas fa-arrow-left me-2"></i>返回首页
          </a>
        </div>

        <div class="row">
          <!-- 侧边栏 -->
          <div class="col-md-3 mb-4">
            <div class="profile-sidebar">
              <!-- 会员卡片 -->
              <div class="membership-card">
                <!-- 会员信息将由JavaScript动态填充 -->
              </div>

              <!-- 导航菜单 -->
              <div class="profile-sidebar-menu">
                <ul class="list-group">
                  <li class="list-group-item">
                    <a href="#membership-info" class="text-decoration-none">
                      <i class="fas fa-crown me-2"></i> 会员信息
                    </a>
                  </li>
                  <li class="list-group-item">
                    <a href="#recharge" class="text-decoration-none">
                      <i class="fas fa-wallet me-2"></i> 会员充值
                    </a>
                  </li>
                  <li class="list-group-item">
                    <a href="#points-history" class="text-decoration-none">
                      <i class="fas fa-history me-2"></i> 积分记录
                    </a>
                  </li>
                </ul>
              </div>
            </div>
          </div>

          <!-- 主内容 -->
          <div class="col-md-9">
            <!-- 会员权益 -->
            <section id="membership-info" class="mb-5">
              <h2 class="mb-4">会员权益</h2>
              <div class="member-benefits">
                <!-- 会员权益将由JavaScript动态填充 -->
              </div>

              <!-- 等级说明 -->
              <div class="card">
                <div class="card-header">
                  <h3 class="mb-0">会员等级说明</h3>
                </div>
                <div class="card-body">
                  <div class="table-responsive">
                    <table class="table">
                      <thead>
                        <tr>
                          <th>等级</th>
                          <th>所需积分</th>
                          <th>折扣权益</th>
                          <th>积分倍率</th>
                        </tr>
                      </thead>
                      <tbody>
                        <tr>
                          <td>青铜会员</td>
                          <td>0</td>
                          <td>98折</td>
                          <td>1倍</td>
                        </tr>
                        <tr>
                          <td>白银会员</td>
                          <td>1,000</td>
                          <td>95折</td>
                          <td>1.2倍</td>
                        </tr>
                        <tr>
                          <td>黄金会员</td>
                          <td>5,000</td>
                          <td>92折</td>
                          <td>1.5倍</td>
                        </tr>
                        <tr>
                          <td>铂金会员</td>
                          <td>20,000</td>
                          <td>88折</td>
                          <td>2倍</td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            </section>

            <!-- 充值区域 -->
            <section id="recharge" class="mb-5">
              <h2 class="mb-4">会员充值</h2>
              <div class="card">
                <div class="card-body">
                  <div class="recharge-options">
                    <!-- 充值选项将由JavaScript动态填充 -->
                  </div>

                  <form id="recharge-form" class="mt-4">
                    <div class="row align-items-end">
                      <div class="col-md-6 mb-3">
                        <label for="payment-method" class="form-label"
                          >支付方式</label
                        >
                        <select
                          class="form-select"
                          id="payment-method"
                          required
                        >
                          <option value="alipay">支付宝</option>
                          <option value="wechat">微信支付</option>
                          <option value="card">银行卡</option>
                        </select>
                      </div>
                      <div class="col-md-6 mb-3">
                        <button type="submit" class="btn btn-primary w-100">
                          立即充值
                        </button>
                      </div>
                    </div>
                  </form>
                </div>
              </div>
            </section>

            <!-- 积分记录 -->
            <section id="points-history">
              <h2 class="mb-4">积分记录</h2>
              <div class="card">
                <div class="card-body">
                  <div class="table-responsive">
                    <table class="table">
                      <thead>
                        <tr>
                          <th>时间</th>
                          <th>类型</th>
                          <th>积分变动</th>
                          <th>备注</th>
                        </tr>
                      </thead>
                      <tbody id="points-history-body">
                        <!-- 积分记录将由JavaScript动态填充 -->
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            </section>
          </div>
        </div>
      </div>
    </main>

    <!-- 页脚 -->
    <footer>
      <!-- ...existing footer code... -->
    </footer>

    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- 自定义脚本 -->
    <script src="js/petals.js"></script>
    <script src="js/main.js"></script>
    <script src="js/session.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/membership.js"></script>
  </body>
</html>
