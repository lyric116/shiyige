<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>拾遗阁 - 我的订单</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="gradient-spot"></div>
    <div class="gradient-spot"></div>
    <div class="gradient-spot"></div>
    <div class="gradient-spot"></div>
    <div class="gradient-spot"></div>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <img src="images/logo.svg" alt="拾遗阁" height="50" />
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html"><span>首页</span></a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="category.html"><span>分类</span></a>
            </li>
            <li class="nav-item">
              <form class="d-flex">
                <div class="input-group">
                  <input
                    class="form-control"
                    type="search"
                    placeholder="搜索商品"
                    aria-label="搜索"
                  />
                  <button class="btn" type="submit">
                    <i class="fas fa-search text-light"></i>
                  </button>
                </div>
              </form>
            </li>
          </ul>
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link position-relative cart-link" href="cart.html">
                <i class="fas fa-shopping-cart"></i>
                <span>购物车</span>
                <span
                  id="cart-count"
                  class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none"
                >
                  0
                </span>
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="login.html"><span>登录</span></a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="register.html"><span>注册</span></a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div id="flash-messages" class="container mt-3"></div>

    <main class="py-4">
      <div class="container my-4">
        <div class="row">
          <div class="col-md-3 mb-4">
              <div class="profile-sidebar">
              <div class="profile-sidebar-header text-center mb-4">
                <div class="profile-avatar">
                  <i class="fas fa-user-circle fa-5x"></i>
                </div>
                <h4 class="mt-3" id="sidebar-username">用户名</h4>
                <p class="text-muted" id="sidebar-email">邮箱地址</p>
              </div>
              <div class="profile-sidebar-menu">
                <ul class="list-group">
                  <li class="list-group-item">
                    <a href="profile.html" class="text-decoration-none">
                      <i class="fas fa-user me-2"></i> 个人信息
                    </a>
                  </li>
                  <li class="list-group-item active">
                    <a href="orders.html" class="text-decoration-none">
                      <i class="fas fa-shopping-bag me-2"></i> 我的订单
                    </a>
                  </li>
                  <li class="list-group-item">
                    <a
                      href="#"
                      id="logout-sidebar-btn"
                      class="text-decoration-none"
                    >
                      <i class="fas fa-sign-out-alt me-2"></i> 退出登录
                    </a>
                  </li>
                </ul>
              </div>
            </div>
          </div>

          <div class="col-md-9">
            <div class="profile-content">
              <div class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-4">
                <div>
                  <h2 class="mb-2">我的订单</h2>
                  <p class="text-muted mb-0">
                    查看真实订单列表、支付记录与当前订单状态。
                  </p>
                </div>
                <a href="cart.html" class="btn btn-outline-primary">前往购物车</a>
              </div>

              <div class="row g-3 mb-4">
                <div class="col-md-4">
                  <div class="card order-stat-card h-100">
                    <div class="card-body">
                      <div class="text-muted small mb-2">订单总数</div>
                      <div class="display-6 mb-0" id="summary-total">0</div>
                    </div>
                  </div>
                </div>
                <div class="col-md-4">
                  <div class="card order-stat-card h-100">
                    <div class="card-body">
                      <div class="text-muted small mb-2">待支付</div>
                      <div class="display-6 mb-0 text-warning" id="summary-pending">0</div>
                    </div>
                  </div>
                </div>
                <div class="col-md-4">
                  <div class="card order-stat-card h-100">
                    <div class="card-body">
                      <div class="text-muted small mb-2">已支付</div>
                      <div class="display-6 mb-0 text-success" id="summary-paid">0</div>
                    </div>
                  </div>
                </div>
              </div>

              <div id="orders-loading" class="alert alert-secondary mb-4" role="alert">
                正在加载订单...
              </div>

              <div id="orders-empty-state" class="card d-none">
                <div class="card-body p-4 text-center">
                  <h3 class="h5 mb-3">暂时还没有订单</h3>
                  <p class="text-muted mb-4">
                    去分类页挑选一件喜欢的商品，完成第一次下单。
                  </p>
                  <div class="d-flex justify-content-center gap-2 flex-wrap">
                    <a href="category.html" class="btn btn-primary">去逛逛</a>
                    <a href="cart.html" class="btn btn-outline-secondary">查看购物车</a>
                  </div>
                </div>
              </div>

              <div id="orders-content" class="row g-4 d-none">
                <div class="col-lg-5">
                  <div class="card h-100">
                    <div class="card-header d-flex justify-content-between align-items-center">
                      <span>订单列表</span>
                      <span id="orders-list-count" class="badge bg-secondary">0</span>
                    </div>
                    <div class="list-group list-group-flush" id="orders-list"></div>
                  </div>
                </div>

                <div class="col-lg-7">
                  <div class="card h-100">
                    <div class="card-body" id="order-detail">
                      <p class="text-muted mb-0">正在加载订单详情...</p>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer>
      <div class="container">
        <div class="copyright">
          <p>© <span id="current-year"></span> 拾遗阁 版权所有</p>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/petals.js"></script>
    <script src="js/main.js"></script>
    <script src="js/session.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/orders-page.js"></script>
  </body>
</html>
