<svg xmlns="http://www.w3.org/2000/svg" width="200" height="80" viewBox="0 0 200 80">
  <style>
    .logo-text {
      font-family: 'STSong', 'SimSun', serif;
      font-size: 36px;
      font-weight: bold;
      fill: #F5F5DC;
    }
    .subtitle {
      font-family: 'STSong', 'SimSun', serif;
      font-size: 16px;
      fill: #F5F5DC;
    }
    .logo-border {
      fill: none;
      stroke: #DAA520;
      stroke-width: 2;
    }
    .logo-bg {
      fill: #9A1F1A;
    }
  </style>
  
  <!-- 背景矩形 -->
  <rect x="10" y="10" width="180" height="60" rx="8" class="logo-bg" />
  
  <!-- 装饰边框 -->
  <rect x="14" y="14" width="172" height="52" rx="6" class="logo-border" />
  
  <!-- 中文标题 -->
  <text x="100" y="45" text-anchor="middle" class="logo-text">拾遗阁</text>
  
  <!-- 英文副标题 -->
  <text x="100" y="62" text-anchor="middle" class="subtitle">Shi Yi Ge</text>
  
  <!-- 左侧装饰云纹 -->
  <path d="M30,30 C35,25 40,35 45,30 C50,25 55,35 60,30" stroke="#DAA520" stroke-width="2" fill="none" />
  
  <!-- 右侧装饰云纹 -->
  <path d="M140,30 C145,25 150,35 155,30 C160,25 165,35 170,30" stroke="#DAA520" stroke-width="2" fill="none" />
</svg>
